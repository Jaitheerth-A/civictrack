services:
  - type: web
    name: civictrack-api
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    plan: free
    autoDeploy: true
    envVars:
      - key: MONGO_URI
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_TOKEN_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_INSIGHTS_MODEL
        value: gpt-4o-mini
